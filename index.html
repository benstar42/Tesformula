<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte de Résidence</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Konsepsyon Kat la */
        .residence-card {
            width: 500px;
            height: 300px;
            background: linear-gradient(135deg, #eef2f3 0%, #8e9eab 100%);
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            border: 2px solid #718093;
            overflow: hidden;
        }

        /* Filigran / Fond */
        .residence-card::before {
            content: "RÉSIDENT";
            position: absolute;
            font-size: 60px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.15);
            transform: rotate(-25deg);
            top: 30%;
            left: 15%;
            z-index: 1;
            pointer-events: none;
        }

        /* Tèt Kat la */
        .card-header {
            text-align: center;
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 8px;
            margin-bottom: 15px;
            position: relative;
            z-index: 2;
        }

        .card-header h1 {
            font-size: 16px;
            margin: 0;
            text-transform: uppercase;
            color: #2c3e50;
            letter-spacing: 1px;
        }

        .card-header h2 {
            font-size: 13px;
            margin: 3px 0 0 0;
            color: #7f8c8d;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* Kò Kat la (Foto ak Enfòmasyon) */
        .card-body {
            display: flex;
            gap: 20px;
            position: relative;
            z-index: 2;
        }

        /* Blòk Foto a */
        .photo-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile-img {
            width: 110px;
            height: 130px;
            object-fit: cover;
            border: 2px solid #2c3e50;
            border-radius: 5px;
            background-color: #fff;
        }

        .signature-box {
            margin-top: 10px;
            width: 110px;
            height: 35px;
            border: 1px dashed #7f8c8d;
            background-color: rgba(255,255,255,0.5);
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #7f8c8d;
            font-style: italic;
        }

        /* Blòk Teks Done yo */
        .info-section {
            flex-grow: 1;
            display: grid;
            grid-template-columns: 1fr;
            row-gap: 8px;
        }

        .info-group {
            display: flex;
            flex-direction: column;
        }

        .info-row-inline {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .label {
            font-size: 10px;
            text-transform: uppercase;
            color: #7f8c8d;
            font-weight: bold;
            margin-bottom: 1px;
        }

        .value {
            font-size: 14px;
            font-weight: bold;
            color: #2c3e50;
            text-transform: uppercase;
        }

        /* Anba Kat la (Dat ak Nimewo) */
        .card-footer {
            position: absolute;
            bottom: 15px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid rgba(0,0,0,0.1);
            padding-top: 8px;
            font-size: 11px;
            z-index: 2;
        }

        .card-id {
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: #d35400;
        }
    </style>
</head>
<body>

    <div class="residence-card">
        <div class="card-header">
            <h1>République Démocratique du Congo</h1>
            <h2>CARTE DE RÉSIDENCE</h2>
        </div>

        <div class="card-body">
            <div class="photo-section">
                <img class="profile-img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQz0TuHToiNWnU1Rbr8ARH2PyhuQf4bHY0DuzbdB2h2vg&s=10" alt="Foto Souffrant Robes">
                <div class="signature-box">Signature</div>
            </div>

            <div class="info-section">
                <div class="info-group">
                    <span class="label">Nom / Surname</span>
                    <span class="value">SOUFFRANT</span>
                </div>
                
                <div class="info-group">
                    <span class="label">Prénom / Given Names</span>
                    <span class="value">Robes</span>
                </div>

                <div class="info-row-inline">
                    <div class="info-group">
                        <span class="label">Nationalité / Nationality</span>
                        <span class="value">HT (Haïtienne)</span>
                    </div>
                    <div class="info-group">
                        <span class="label">Sexe / Sex</span>
                        <span class="value">M</span>
                    </div>
                </div>

                <div class="info-group">
                    <span class="label">Date de Naissance / Date of Birth</span>
                    <span class="value">10 Janvier 1995</span>
                </div>
            </div>
        </div>

        <div class="card-footer">
            <div><span style="color: #7f8c8d;">Expire le:</span> <b>02/06/2028</b></div>
            <div class="card-id">N° RE-849201-HT</div>
        </div>
    </div>

</body>
</html>
